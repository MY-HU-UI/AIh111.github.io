<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陆地野生动物 - 动物世界</title>
    <link rel="stylesheet" href="land.css">
</head>
<body>
<div id="top"></div>

<nav id="nav">
  <div>🌍 动物世界</div>
  <div>
    <a href="index.html">首页</a>
    <a href="land.html" class="active">陆地</a>
    <a href="sea.html">海洋</a>
    <a href="bird.html">鸟类</a>
    <a href="protect.html">保护</a>
  </div>
</nav>

<!-- =================== Banner =================== -->
<section class="land-banner">
    <div class="banner-mask"></div>
    <div class="banner-content">
        <h1>陆地野生动物</h1>
        <p>探索地球陆地生态的奇妙生灵</p>
    </div>

    <!-- 四大分类卡片（草原、森林、荒漠、极地） -->
    <div class="category-area">
        <!-- 草原 -->
        <div class="glass-card">
            <img src="images/grassland.jpg" alt="草原动物">   <!-- ← 你在这里放图片 -->
            <h3>草原动物</h3>
            <p>非洲狮、斑马、大象等，生活在广阔草原上的奔跑者。</p>
            <button onclick="alert('跳转至草原详细页（后续添加）')">立即探索</button>
        </div>

        <!-- 森林 -->
        <div class="glass-card">
            <img src="images/forest.jpg" alt="森林动物">     <!-- ← 你在这里放图片 -->
            <h3>森林动物</h3>
            <p>大熊猫、小鹿、金丝猴等，栖息于茂密森林的精灵。</p>
            <button onclick="alert('跳转至森林详细页（后续添加）')">立即探索</button>
        </div>

        <!-- 荒漠 -->
        <div class="glass-card">
            <img src="images/desert.jpg" alt="荒漠动物">      <!-- ← 你在这里放图片 -->
            <h3>荒漠动物</h3>
            <p>骆驼、耳廓狐、沙漠蜥蜴等，适应干旱环境的生存专家。</p>
            <button onclick="alert('跳转至荒漠详细页（后续添加）')">立即探索</button>
        </div>

        <!-- 极地 -->
        <div class="glass-card">
            <img src="images/polar.jpg" alt="极地动物">       <!-- ← 你在这里放图片 -->
            <h3>极地动物</h3>
            <p>北极熊、北极狐等，在严寒极地顽强生存的勇士。</p>
            <button onclick="alert('跳转至极地详细页（后续添加）')">立即探索</button>
        </div>
    </div>
</section>

<!-- =================== 介绍板块 =================== -->
<section class="intro">
    <h2>探索陆地生命</h2>
    <div class="line"></div>
    <p>陆地占地球表面积约29%，却孕育了无数神奇的野生动物。从一望无际的草原，到茂密的原始森林，再到极寒的极地，每一片土地都承载着独特的生命故事。</p>
</section>

<footer>
    ©2026 动物世界 Land Animal Encyclopedia
</footer>

<!-- 返回顶部 -->
<a href="#top" class="top-btn">↑</a>

<script>
window.addEventListener("scroll", () => {
  let nav = document.getElementById("nav");
  if (window.scrollY > 50) {
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }
});
</script>
</body>
</html>
