<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陆地野生动物 - 动物世界</title>
    <link rel="stylesheet" href="land.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">🌍 动物世界</a>
            <div class="nav-menu">
                <a href="index.html">首页</a>
                <a href="land.html" class="active">陆地动物</a>
                <a href="sea.html">海洋生物</a>
                <a href="bird.html">飞禽鸟类</a>
                <a href="protect.html">动物保护</a>
            </div>
        </div>
    </nav>

    <!-- Hero 主标题 -->
    <div class="hero">
        <h1>陆地野生动物</h1>
        <p>探索地球陆地生态的奇妙生灵</p>
    </div>

    <!-- 四大分类卡片 -->
    <div class="categories">
        <div class="category-card" onclick="window.location.href='#grassland'">
            <img src="https://images.unsplash.com/photo-1546587348-4e9c4f4e3c3f" alt="草原">
            <div class="overlay">
                <span class="emoji">🌾</span>
                <h3>草原动物</h3>
                <p>狮子、斑马、大象等</p>
                <button class="explore-btn">立即探索</button>
            </div>
        </div>

        <div class="category-card" onclick="window.location.href='#forest'">
            <img src="https://images.unsplash.com/photo-1542204165-65bf264072ce" alt="森林">
            <div class="overlay">
                <span class="emoji">🌲</span>
                <h3>森林动物</h3>
                <p>大熊猫、小鹿、金丝猴等</p>
                <button class="explore-btn">立即探索</button>
            </div>
        </div>

        <div class="category-card" onclick="window.location.href='#desert'">
            <img src="https://images.unsplash.com/photo-1509316785289-025f5b8464b4" alt="荒漠">
            <div class="overlay">
                <span class="emoji">🏜️</span>
                <h3>荒漠动物</h3>
                <p>骆驼、耳廓狐、蜥蜴等</p>
                <button class="explore-btn">立即探索</button>
            </div>
        </div>

        <div class="category-card" onclick="window.location.href='#polar'">
            <img src="https://images.unsplash.com/photo-1511497588687-8b6d2e9c3f2a" alt="极地">
            <div class="overlay">
                <span class="emoji">❄️</span>
                <h3>极地动物</h3>
                <p>北极熊、北极狐等</p>
                <button class="explore-btn">立即探索</button>
            </div>
        </div>
    </div>

    <!-- 详细介绍区 -->
    <div id="grassland" class="detail-section">
        <h2>🌾 草原动物</h2>
        <!-- 这里可以继续放更多卡片 -->
    </div>

    <!-- 视觉冲击力大图 -->
    <div class="impact-image">
        <img src="https://images.unsplash.com/photo-1547036967-5c5f3c5c5c5c" alt="壮丽陆地景观">
    </div>

    <footer>
        <p>动物世界科普网站 © 2026 | 陆地野生动物专区</p>
    </footer>

    <script src="land.js"></script>
</body>
</html>
