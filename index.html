
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人博客</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    header p {
      margin-top: 10px;
      font-size: 18px;
    }

    nav {
      background-color: #34495e;
      text-align: center;
      padding: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      width: 80%;
      max-width: 1000px;
      margin: 30px auto;
      display: flex;
      gap: 20px;
    }

    main {
      flex: 3;
      background-color: white;
      padding: 25px;
      border-radius: 10px;
    }

    aside {
      flex: 1;
      background-color: white;
      padding: 25px;
      border-radius: 10px;
    }

    article {
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    article h2 {
      color: #2c3e50;
    }

    article a {
      color: #2980b9;
      text-decoration: none;
    }

    article a:hover {
      text-decoration: underline;
    }

    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <header>
    <h1>我的个人博客</h1>
    <p>记录学习、生活和项目</p>
  </header>

  <nav>
    <a href="#">首页</a>
    <a href="#">文章</a>
    <a href="#">项目</a>
    <a href="#">关于我</a>
  </nav>

  <div class="container">

    <main>

      <article>

  <footer>
    <p>© 2026 我的个人博客</p>

</body>
</html>
